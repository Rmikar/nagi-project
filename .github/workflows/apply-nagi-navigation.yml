name: Apply Nagi value and public-spheres navigation

on:
  pull_request:
    branches:
      - main
    paths:
      - "scripts/apply_nagi_navigation.mjs"
      - ".github/workflows/apply-nagi-navigation.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/nagi-value-structure-navigation'
    runs-on: ubuntu-latest
    steps:
      - name: Check out head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Apply source updates
        run: node scripts/apply_nagi_navigation.mjs

      - name: Generate discovery artifacts
        run: npm run build:discovery

      - name: Validate source and generated files
        run: npm run validate

      - name: Commit integrated navigation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Integrate value, structure, and public spheres navigation"
          git push origin HEAD:${{ github.head_ref }}
