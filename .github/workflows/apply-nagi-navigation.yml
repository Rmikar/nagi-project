name: Apply Nagi value and public-spheres navigation

on:
  pull_request:
    branches:
      - main
    paths:
      - "scripts/apply_nagi_navigation.mjs"
      - ".github/workflows/apply-nagi-navigation.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/nagi-value-structure-navigation'
    runs-on: ubuntu-latest
    steps:
      - name: Check out head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fix sequential reading-guide replacement
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/apply_nagi_navigation.mjs")
          source = path.read_text(encoding="utf-8")
          old = "`- [社会的装置の倫理](ethics_of_social_infrastructure.html)\\n\\n### AI倫理・デジタル社会`,"
          new = "`- [社会的装置の倫理](ethics_of_social_infrastructure.html)\\n- [制度免疫](institutional_immunity.html)\\n\\n### AI倫理・デジタル社会`,"
          if source.count(old) != 1:
              raise SystemExit(f"expected one reading-guide anchor, found {source.count(old)}")
          path.write_text(source.replace(old, new), encoding="utf-8")
          PY

      - name: Apply source updates
        run: node scripts/apply_nagi_navigation.mjs

      - name: Generate discovery artifacts
        run: npm run build:discovery

      - name: Validate source and generated files
        run: npm run validate

      - name: Commit integrated navigation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Integrate value, structure, and public spheres navigation"
          git push origin HEAD:${{ github.head_ref }}
