name: Annual re-breathing review

on:
  schedule:
    - cron: '0 0 18 8 *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  review-checkpoint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate current public corpus
        run: npm test

      - name: Record the review questions
        run: |
          {
            echo "## Nagi annual re-breathing checkpoint"
            echo
            echo "This workflow does not rewrite philosophy or claim that an AI remembers a person."
            echo "Use this checkpoint to review the core, safeguards, new harms, needed corrections, archival boundaries, and unresolved questions."
            echo
            echo "See: docs/rebreathing_and_public_continuity.md"
          } >> "$GITHUB_STEP_SUMMARY"
